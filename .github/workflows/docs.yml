name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'nocturne-kx.cpp'
      - 'Doxyfile'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Required so the deploy step can publish to gh-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an in-flight deploy when a newer commit lands so we don't ship
# an older preview after a fresh one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastUpdated needs full history

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package.json

      # ---- Doxygen API reference ------------------------------------------
      - name: Install Doxygen + Graphviz
        run: sudo apt-get install -y doxygen graphviz

      - name: Clone doxygen-awesome-css
        run: git clone --depth 1 https://github.com/jothepro/doxygen-awesome-css.git /tmp/doxygen-awesome

      - name: Generate C++ API reference
        run: |
          mkdir -p /tmp/doxygen-out
          doxygen Doxyfile
          mkdir -p docs/public/doxygen
          cp -r /tmp/doxygen-out/html/. docs/public/doxygen/

      # ---- VitePress site -------------------------------------------------
      - name: Install Node dependencies
        working-directory: docs
        run: npm install --no-package-lock

      - name: Build VitePress site
        working-directory: docs
        env:
          DOCS_BASE: /nocturne-kx/
        run: npm run docs:build

      # ---- GitHub Pages ---------------------------------------------------
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://bufffer.github.io/nocturne-kx/
            https://bufffer.github.io/nocturne-kx/guide/quickstart
            https://bufffer.github.io/nocturne-kx/architecture
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
